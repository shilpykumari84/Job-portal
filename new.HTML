<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Portal - Find & Post Jobs</title>
    <link rel="stylesheet" href="new style.css">
</head>
<body>
    <header>
        <h1>Job Portal</h1>
    </header>
    <nav>
        <ul>
            <li><a href="#" onclick="showSection('home')">Home</a></li>
            <li><a href="#" onclick="showSection('jobs')">Browse Jobs</a></li>
            <li><a href="#" onclick="showSection('add')">Post a Job</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <!-- Home/Search Section -->
    <section id="home" class="section active">
        <div class="search">
            <h2>Find Your Dream Job</h2>
            <form id="searchForm">
                <input type="text" name="keywords" placeholder="Job keywords">
                <input type="text" name="location" placeholder="Location">
                <input type="text" name="company" placeholder="Company">
                <button type="submit">Search Jobs</button>
            </form>
        </div>
    </section>

    <!-- Job Listings -->
    <section id="jobs" class="section">
        <div class="job-listings">
            <h2>Latest Job Openings</h2>
            <ul id="jobList"></ul>
        </div>
    </section>

    <!-- Add Job Form -->
    <section id="add" class="section">
        <div class="add-job">
            <h2>Post a New Job</h2>
            <form id="jobForm">
                <input type="text" name="title" placeholder="Job Title" required>
                <input type="text" name="company" placeholder="Company Name" required>
                <input type="text" name="location" placeholder="Location" required>
                <select name="type" required>
                    <option value="">Job Type</option>
                    <option value="Full-time">Full-time</option>
                    <option value="Part-time">Part-time</option>
                    <option value="Contract">Contract</option>
                    <option value="Remote">Remote</option>
                </select>
                <textarea name="desc" placeholder="Job Description" required></textarea>
                <textarea name="details" placeholder="Additional Details (Salary, Skills etc.)" required></textarea>
                <button type="submit">Post Job</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Job Portal. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
